template_id: report
template_name: 正式报告模板
description: 用于内网正式报告的 docx 离线排版模板，仅定义安全格式规则，不允许修改业务文本内容。

rules:
  title:
    font_name: SimHei
    font_size: 22
    bold: true
    alignment: center
    line_spacing: 1.5
    space_before: 0
    space_after: 12
    first_line_indent_chars: 0

  heading_1:
    font_name: SimHei
    font_size: 16
    bold: true
    alignment: left
    line_spacing: 1.5
    space_before: 12
    space_after: 6
    first_line_indent_chars: 0

  heading_2:
    font_name: SimHei
    font_size: 15
    bold: true
    alignment: left
    line_spacing: 1.5
    space_before: 10
    space_after: 6
    first_line_indent_chars: 0

  heading_3:
    font_name: SimHei
    font_size: 14
    bold: true
    alignment: left
    line_spacing: 1.5
    space_before: 8
    space_after: 4
    first_line_indent_chars: 0

  body:
    font_name: SimSun
    font_size: 12
    bold: false
    alignment: justify
    line_spacing: 1.5
    space_before: 0
    space_after: 0
    first_line_indent_chars: 2

  table:
    font_name: SimSun
    font_size: 10.5
    bold: false
    alignment: center

  table_header:
    font_name: SimHei
    font_size: 10.5
    bold: true
    alignment: center

safety:
  allow_text_change: false
  allow_delete_paragraph: false
  allow_modify_table_text: false
  allow_overwrite_source: false
